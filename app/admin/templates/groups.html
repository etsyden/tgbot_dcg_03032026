{% extends "base.html" %}

{% block title %}Группы - Dental Clinic Admin{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title">Группы пользователей</h2>
        <button class="btn btn-primary" onclick="openModal('groupModal')">+ Добавить группу</button>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for group in groups %}
            <tr>
                <td>{{ group.id }}</td>
                <td>{{ group.name }}</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="deleteGroup({{ group.id }})">Удалить</button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="empty-state">Нет групп</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div id="groupModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Добавить группу</h3>
            <button class="modal-close" onclick="closeModal('groupModal')">&times;</button>
        </div>
        <div class="form-group">
            <label class="form-label">Название группы</label>
            <input type="text" id="groupName" class="form-control" placeholder="Введите название группы">
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal('groupModal')">Отмена</button>
            <button class="btn btn-primary" onclick="createGroup()">Создать</button>
        </div>
    </div>
</div>
{% endblock %}
